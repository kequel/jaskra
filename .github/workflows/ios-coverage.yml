name: iOS coverage

# Swift/iOS coverage must be generated on macOS (the .swiftpm app uses
# UIKit/SwiftUI/AppleProductTypes, which only build with Xcode). This runs on
# GitHub's hosted macOS runner — no local Mac is needed.

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-coverage.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-coverage.yml'

jobs:
  ios-coverage:
    runs-on: macos-14
    permissions:
      contents: read
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Environment & available schemes
        run: |
          xcodebuild -version
          echo "Schemes (confirm the -scheme value used below):"
          xcodebuild -list || true

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          NAME=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9]+( Pro)?' | head -1)
          echo "Using simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build & test with coverage
        # Non-blocking while CI for the .swiftpm app package is being dialed in.
        continue-on-error: true
        run: |
          xcodebuild test \
            -scheme JaskraApp \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            -derivedDataPath DerivedData

      - name: Export coverage to lcov
        if: always()
        run: |
          PROFDATA=$(find DerivedData -name '*.profdata' | head -1)
          APP=$(find DerivedData/Build/Products -name '*.app' -type d | head -1)
          echo "profdata: $PROFDATA"
          echo "app:      $APP"
          if [ -n "$PROFDATA" ] && [ -n "$APP" ]; then
            BIN="$APP/$(basename "$APP" .app)"
            xcrun llvm-cov export -format=lcov \
              -instr-profile "$PROFDATA" "$BIN" \
              --ignore-filename-regex='(Tests|DerivedData)/' \
              > coverage.lcov || echo "llvm-cov export failed."
          else
            echo "No .profdata/.app found — did the test step build & run? (check the step above)"
          fi

      - name: Upload Swift coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: mobile/coverage.lcov
          flags: swift
          fail_ci_if_error: false

      - name: Report Swift test results on the PR
        if: always()
        continue-on-error: true
        uses: kishikawakatsumi/xcresulttool@v1
        with:
          path: mobile/TestResults.xcresult
          show-passed-tests: false

      - name: Upload xcresult artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: mobile/TestResults.xcresult
          if-no-files-found: ignore

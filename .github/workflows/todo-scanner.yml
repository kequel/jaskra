name: TODO scanner

on:
  pull_request:
    branches:
      - main

jobs:
  scan-todos:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout full repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan TODOs and post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            const raw = execSync(
              `grep -rni "TODO" . \
                --include="*.py" \
                --include="*.swift" \
                --include="*.yml" \
                --include="*.yaml" \
                --include="*.md" \
                --exclude-dir=".git" \
                --exclude-dir="docs" \
                2>/dev/null || true`,
              { encoding: 'utf8' }
            );

            const lines = raw.trim().split('\n').filter(Boolean);

            let body = '## REMAINING TODOs (from todo-scanner)\n\n';

            if (lines.length === 0) {
              body += 'None\n';
            } else {
              for (const line of lines) {
                const match = line.match(/^\.\/(.+?):(\d+):\s*.*?TODO:?\s*(.*)/i);
                if (match) {
                  const [, file, lineNum, text] = match;
                  const cleaned = text.trim() || '(no description)';
                  body += `[line ${lineNum}] [${file}] - ${cleaned}\n`;
                }
              }
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('## REMAINING TODOs (from todo-scanner)')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
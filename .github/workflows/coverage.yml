name: Code coverage

on:
  push:
    branches:
      - main
    paths:
      - 'tests/**'
      - 'backend/**'
      - 'ai/**'
      - '.coveragerc'
      - 'codecov.yml'
      - '.github/workflows/coverage.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'tests/**'
      - 'backend/**'
      - 'ai/**'
      - '.coveragerc'
      - 'codecov.yml'
      - '.github/workflows/coverage.yml'

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      # main.py refuses to import without a secret key
      SECRET_KEY: test-secret-key-not-for-production
      # let the tests resolve `main`, `tests.*` and `pipeline` imports
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend:${{ github.workspace }}/ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r requirements-test.txt

      - name: Run tests with coverage
        # Non-blocking for now — the test suite is still being built out.
        # Remove `continue-on-error` once coverage should gate merges.
        continue-on-error: true
        run: |
          pytest -m "not integration" \
            --cov=backend --cov=ai \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Write coverage summary
        if: always()
        run: |
          {
            echo "### 📊 Code coverage"
            echo '```'
            coverage report || echo "No coverage data (tests may have failed to run)."
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: ignore

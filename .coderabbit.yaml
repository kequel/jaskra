# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en
tone_instructions: Be concise and technical. No motivational language.
reviews:
  profile: assertive
  high_level_summary: true 
  high_level_summary_instructions: >
    Short bullet-points summary. 
    Start with "Coderabbit's summary:".
  review_status: false
  collapse_walkthrough: false
  changed_files_summary: false
  related_prs: true
  related_issues: true
  suggested_reviewers: true
  enable_prompt_for_ai_agents: false
  sequence_diagrams: false
  estimate_code_review_effort: false
  assess_linked_issues: false
  suggested_labels: false
  auto_assign_reviewers: true
  in_progress_fortune: false
  poem: false
  path_filters:
    - '!.github/workflows/todo-scanner.yml'
    - '!docs/**'
  path_instructions:
    - path: '**/*'
      instructions: |-
        Strictly technical and concise. ABSOLUTELY NO EMOJI.
        No conversational filler like "Great job" or "I noticed".
        Focus only on logic, security, and performance.
        I need suggested PR reviewers and linked issues, add them.
  auto_review:
    enabled: true
    base_branches:
      - main
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
  pre_merge_checks:
    docstrings:
      mode: 'off'
    description:
      mode: 'off'
chat:
  art: false
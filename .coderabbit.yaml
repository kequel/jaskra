# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en
tone_instructions: Be concise and technical. No motivational language.
reviews:
  profile: assertive
  review_status: false
  changed_files_summary: false
  sequence_diagrams: false
  estimate_code_review_effort: false
  assess_linked_issues: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  suggested_reviewers: false
  poem: false
  path_filters:
    - '!.github/workflows/todo-scanner.yml'
    - '!docs/**'
  path_instructions:
    - path: '**/*'
      instructions: >
        Post exactly two types of output, nothing else.


        1. ONE top-level summary comment with this exact format, no emoji:


        SUMMARY:

        Brief description of what the PR changes.


        ERRORS:

        Number of errors: N

        [line X-Y][filename] - description


        WARNINGS:

        Number of warnings: N

        [line X-Y][filename] - description


        POSSIBLE STYLE CORRECTIONS:

        [line X-Y][filename] - description


        POLISH LANGUAGE DETECTED:

        Scan only files changed in this PR, exclude docs/.

        List every occurrence of Polish in code (comments, strings, variable names, print
        statements).

        If none found, write "None".

        [line X-Y][filename] - description


        2. SEPARATE inline comment for each error and warning, posted on the relevant line, no
        emoji:


        [ERROR] or [WARNING]

        description

        suggested fix


        Rules:

        - No emoji anywhere

        - Focus on logic errors, missing error handling, hardcoded values, security issues

        - Strictly follow the formats above
  auto_review:
    base_branches:
      - main